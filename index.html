<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile Apps Hub</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 10px;
            font-size: 1.8rem;
            text-align: center;
        }

        .subtitle {
            color: #7f8c8d;
            margin-top: -10px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            text-align: center;
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-size: 1.1rem;
            transition: transform 0.15s, box-shadow 0.15s;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-card:active {
            transform: scale(0.98);
            background: #fafafa;
        }

        .arrow {
            color: #bdc3c7;
            font-size: 1.2rem;
        }

        .status {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>My App Studio</h1>
    <div class="subtitle">Automatically updating repository web apps</div>

    <div class="app-list" id="appList">
        <div class="status" id="status">Loading apps from GitHub...</div>
    </div>

    <script>
        // Target your specific repository coordinates
        const USERNAME = 'glitchinthematrix13';
        const REPO = 'JavaApps';
        
        async function loadRepositoryApps() {
            const appListContainer = document.getElementById('appList');
            const statusDiv = document.getElementById('status');

            try {
                // Query the GitHub public API for files in the repository
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                
                if (!response.ok) {
                    throw new Error('Failed to reach GitHub API');
                }

                const files = await response.json();
                
                // Clear out loading status
                appListContainer.innerHTML = '';

                // Filter out non-HTML files, and ignore index.html itself
                const htmlFiles = files.filter(file => 
                    file.name.endsWith('.html') && 
                    file.name.toLowerCase() !== 'index.html'
                );

                if (htmlFiles.length === 0) {
                    appListContainer.innerHTML = '<div class="status">No web apps found in this repository yet!</div>';
                    return;
                }

                // Loop through and programmatically generate UI touch elements
                htmlFiles.forEach(file => {
                    // Turn file names into clean display titles (e.g., "my_mortgage_app.html" -> "My Mortgage App")
                    let cleanName = file.name
                        .replace('.html', '')
                        .replace(/[_-]/g, ' ')
                        .replace(/\b\w/g, c => c.toUpperCase());

                    const card = document.createElement('a');
                    card.className = 'app-card';
                    card.href = file.name; // Use relative path inside repository
                    
                    card.innerHTML = `
                        <span>📱 ${cleanName}</span>
                        <span class="arrow">➔</span>
                    `;
                    
                    appListContainer.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                statusDiv.textContent = '⚠️ Error syncing with GitHub. Please check network or file settings.';
            }
        }

        // Run immediately when index page initializes
        loadRepositoryApps();
    </script>
</body>
</html>
