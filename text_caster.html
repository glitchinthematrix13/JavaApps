<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Text Caster</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    
    <style>
        :root {
            --bg: #121214;
            --card: #1e1e24;
            --primary: #3498db;
            --success: #2ecc71;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .caster-card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            margin: 0;
            text-align: center;
            font-size: 1.4rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #121214;
            border: 1px solid #3a3a45;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-send {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            flex-grow: 1;
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        google-cast-launcher {
            --connected-color: #2ecc71;
            --disconnected-color: #ffffff;
            width: 44px;
            height: 44px;
            cursor: pointer;
            background: #2a2a35;
            border-radius: 8px;
            padding: 2px;
        }

        .status-box {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            font-style: italic;
        }

        /* Keep the rendering canvas completely hidden from view */
        #renderCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <div class="caster-card">
        <h2>TV Text Caster</h2>
        
        <textarea id="textInput" placeholder="Type what you want to show on the TV screen..."></textarea>

        <div class="controls-row">
            <button class="btn-send" id="sendBtn">Send to TV</button>
            <google-cast-launcher id="castButton"></google-cast-launcher>
        </div>
        
        <div class="status-box" id="castStatus">Initializing Chromecast API...</div>
    </div>

    <canvas id="renderCanvas" width="1920" height="1080"></canvas>

    <script>
        const castStatus = document.getElementById('castStatus');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        let castSession = null;

        // Automatically invoked by the Google Framework loader link
        window.__onGCastApiAvailable = function(isAvailable) {
            if (isAvailable) {
                initializeCastApi();
            } else {
                castStatus.textContent = "Chromecast not supported or blocked by browser settings.";
            }
        };

        function initializeCastApi() {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });

            castStatus.textContent = "Disconnected. Tap the cast icon to link TV.";
            setupCastListeners();
        }

        function setupCastListeners() {
            const context = cast.framework.CastContext.getInstance();
            
            context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, function(event) {
                switch (event.sessionState) {
                    case cast.framework.SessionState.SESSION_STARTING:
                        castStatus.textContent = "Connecting to TV...";
                        break;
                    case cast.framework.SessionState.SESSION_STARTED:
                        castSession = context.getCurrentSession();
                        castStatus.textContent = "Connected! Ready to send text.";
                        sendTextToTV(); // Push whatever is currently inside textarea instantly on link
                        break;
                    case cast.framework.SessionState.SESSION_ENDED:
                        castSession = null;
                        castStatus.textContent = "Disconnected from TV.";
                        break;
                }
            });

            sendBtn.addEventListener('click', sendTextToTV);
        }

        function generateTextImage() {
            const text = textInput.value.trim() || "Type something to display!";
            
            // 1. Reset Canvas to standard 1080p solid black background
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Set up initial typography metrics
            ctx.fillStyle = "#FFFFFF";
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";

            // Splitting logic to manage formatting paragraphs
            const paragraphs = text.split('\n');
            let wordsList = [];
            paragraphs.forEach(p => {
                wordsList = wordsList.concat(p.split(' '), ['\n']);
            });
            if (wordsList[wordsList.length - 1] === '\n') wordsList.pop();

            // 3. Dynamic Font Size Scaling Engine
            let fontSize = 120; // Start with massive presentation sizes
            let lines = [];
            const maxWidth = 1720; // 100px safety borders on left and right
            const maxHeight = 880; // 100px safety borders on top and bottom

            // Loop downwards until text bounding dimensions wrap cleanly inside 1080p boundary walls
            while (fontSize > 20) {
                ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
                lines = [];
                let currentLine = "";

                for (let i = 0; i < wordsList.length; i++) {
                    if (wordsList[i] === '\n') {
                        lines.push(currentLine);
                        currentLine = "";
                        continue;
                    }

                    let testLine = currentLine + (currentLine ? " " : "") + wordsList[i];
                    let metrics = ctx.measureText(testLine);
                    
                    if (metrics.width > maxWidth && currentLine !== "") {
                        lines.push(currentLine);
                        currentLine = wordsList[i];
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);

                // Calculate total vertical height footprint of calculated block layout
                const lineHeight = fontSize * 1.3;
                const totalHeight = lines.length * lineHeight;

                if (totalHeight <= maxHeight) {
                    break; // Fits vertically and horizontally!
                }
                fontSize -= 5; // Scale down font density and recalculate wrap grid
            }

            // 4. Render layout to internal pixel stream
            const lineHeight = fontSize * 1.3;
            const startY = (canvas.height - ((lines.length - 1) * lineHeight)) / 2;

            lines.forEach((line, index) => {
                ctx.fillText(line, canvas.width / 2, startY + (index * lineHeight));
            });

            // Convert canvas rendering space to a base64 DataURL block representation
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        function sendTextToTV() {
            if (!castSession) {
                alert("Please tap the casting icon first to link a TV device on your network!");
                return;
            }

            castStatus.textContent = "Generating screen layout...";
            const dataUrlImage = generateTextImage();

            // Pass data string directly into native media containers
            const mediaInfo = new chrome.cast.media.MediaInfo(dataUrlImage, 'image/jpeg');
            const request = new chrome.cast.media.LoadRequest(mediaInfo);

            castSession.loadMedia(request).then(
                function() { castStatus.textContent = "Text successfully pushed to TV screen!"; },
                function(error) { 
                    castStatus.textContent = "Transmission failed.";
                    console.error('Cast Error: ', error); 
                }
            );
        }
    </script>
</body>
</html>
